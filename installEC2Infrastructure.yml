- name: Make EC2 Instance
  hosts: localhost
  connection: local
  gather_facts: false

  tasks:
    - name: Test Print0
      debug:
        msg:
          - "Testing"

    - name: Generate RSA Key
      amazon.aws.ec2_key:
        name: "{{ key_name }}"
        region: "{{ aws_region }}"
        key_type: "rsa"
      register: ec2_key

    - name: Save private key to disk (only present on first creation)
      when: ec2_key.changed
      copy:
        content: "{{ ec2_key.key.private_key }}"
        dest: "{{ key_save_path }}"
        mode: "0600"

    - name: Test Print
      debug:
        msg:
          - "Test"
      
